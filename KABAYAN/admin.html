<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabayan Tourism - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <script>
        // Redirect if not logged in
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "login.html";
        }
    </script>

    <!-- Admin Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin Panel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Announcements</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">FAQs</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Users</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html" onclick="localStorage.removeItem('isLoggedIn')">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Dashboard -->
    <div class="container my-5">
        <h1 class="mb-4">Welcome, Admin</h1>
        <div class="row">
            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5 class="card-title">Announcements</h5>
                        <p class="card-text">12 Active</p>
                        <a href="#" class="btn btn-primary btn-sm">Manage</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5 class="card-title">FAQs</h5>
                        <p class="card-text">8 Listed</p>
                        <a href="#" class="btn btn-primary btn-sm">Manage</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5 class="card-title">Users</h5>
                        <p class="card-text">3 Admins</p>
                        <a href="#" class="btn btn-primary btn-sm">Manage</a>
                    </div>
                </div>
            </div>
        </div>

        <section class="container my-5">
            <h2>Manage FAQs</h2>
            <form id="faqForm">
                <div class="mb-3">
                    <label for="faqQuestion" class="form-label">Question</label>
                    <input type="text" id="faqQuestion" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="faqAnswer" class="form-label">Answer</label>
                    <textarea id="faqAnswer" class="form-control"></textarea>
                </div>
                <button type="submit" class="btn btn-success">Add FAQ</button>
            </form>

            <ul id="faqList" class="list-group mt-3"></ul>
        </section>

        <section class="container my-5">
            <h2>Manage Announcements</h2>
            <form id="announcementForm">
                <div class="mb-3">
                    <label for="announcementText" class="form-label">Announcement</label>
                    <textarea id="announcementText" class="form-control"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Add Announcement</button>
            </form>

            <ul id="announcementList" class="list-group mt-3"></ul>
        </section>

        <footer class="bg-dark text-white text-center py-3">
            <p>&copy; 2026 Kabayan Tourism Board - Admin</p>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/ad_script.js"></script>
</body>

</html>
