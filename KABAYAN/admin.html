<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kabayan Tourism - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Admin Panel</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><span id="roleBadge" class="badge ms-3"></span></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Tabs -->
  <ul class="nav nav-tabs" id="adminTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#faqs">FAQs</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#announcements">Announcements</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#destinations">Destinations</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#services">Services</button></li>
  </ul>

  <!-- Tab Content -->
  <div class="tab-content mt-3">
    <!-- FAQs -->
    <div class="tab-pane fade show active" id="faqs">
      <h2>Manage FAQs</h2>
      <form id="faqForm" class="mb-3">
        <input type="text" id="faqQuestion" class="form-control mb-2" placeholder="Enter question">
        <textarea id="faqAnswer" class="form-control mb-2" placeholder="Enter answer"></textarea>
        <button type="submit" class="btn btn-success">Add FAQ</button>
      </form>
      <ul id="faqList" class="list-group"></ul>
    </div>

    <!-- Announcements -->
    <div class="tab-pane fade" id="announcements">
      <h2>Manage Announcements</h2>
      <form id="announcementForm" class="mb-3">
        <textarea id="announcementText" class="form-control mb-2" placeholder="Enter announcement"></textarea>
        <button type="submit" class="btn btn-primary">Add Announcement</button>
      </form>
      <ul id="announcementList" class="list-group"></ul>
    </div>

    <!-- Destinations -->
    <div class="tab-pane fade" id="destinations">
      <h2>Manage Destinations</h2>
      <form id="destinationForm" class="mb-3">
        <input type="text" id="destinationName" class="form-control mb-2" placeholder="Destination name">
        <textarea id="destinationDesc" class="form-control mb-2" placeholder="Description"></textarea>
        <button type="submit" class="btn btn-info">Add Destination</button>
      </form>
      <ul id="destinationList" class="list-group"></ul>
    </div>

    <!-- Services -->
    <div class="tab-pane fade" id="services">
      <h2>Manage Services</h2>
      <form id="serviceForm" class="mb-3">
        <input type="text" id="serviceName" class="form-control mb-2" placeholder="Service name">
        <textarea id="serviceDesc" class="form-control mb-2" placeholder="Description"></textarea>
        <button type="submit" class="btn btn-warning">Add Service</button>
      </form>
      <ul id="serviceList" class="list-group"></ul>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3">
    <p>&copy; 2026 Kabayan Tourism Board - Admin</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/ad_script.js"></script>
</body>
</html>
